name: Deploy Mandanga Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Desplegar en VPS vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            PROJECT_DIR="/var/www/mandanga-platform"
            cd $PROJECT_DIR

            echo "======================================"
            echo "PASO 1: BACKUP DEL .ENV"
            echo "======================================"
            if [ -f ".env" ]; then
              cp .env /tmp/.env.backup
              echo "✅ .env respaldado en /tmp/.env.backup"
            else
              echo "⚠️  No existe .env — crea uno manualmente: cp .env.example .env && nano .env"
              exit 1
            fi

            echo "======================================"
            echo "PASO 2: SINCRONIZAR CON GITHUB"
            echo "======================================"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "✅ Código sincronizado con origin/main"

            echo "======================================"
            echo "PASO 3: RESTAURAR .ENV"
            echo "======================================"
            cp /tmp/.env.backup .env
            echo "✅ .env restaurado correctamente"

            echo "======================================"
            echo "PASO 4: DEPENDENCIAS (SIN DEV)"
            echo "======================================"
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            echo "✅ Dependencias instaladas (modo producción)"

            echo "======================================"
            echo "PASO 5: MIGRACIONES (MODO DESARROLLO)"
            echo "======================================"
            # PROBLEMA: db:wipe solo borra schema 'public', ignora schemas custom.
            # Solución: eliminar todos los schemas custom con psql antes del fresh.
            DB_HOST=$(grep "^DB_HOST=" .env | cut -d'=' -f2 | tr -d '\r')
            DB_PORT=$(grep "^DB_PORT=" .env | cut -d'=' -f2 | tr -d '\r')
            DB_NAME=$(grep "^DB_DATABASE=" .env | cut -d'=' -f2 | tr -d '\r')
            DB_USER=$(grep "^DB_USERNAME=" .env | cut -d'=' -f2 | tr -d '\r')
            DB_PASS=$(grep "^DB_PASSWORD=" .env | cut -d'=' -f2 | tr -d '\r')

            echo "→ Eliminando schemas custom en ${DB_NAME}..."
            PGPASSWORD="$DB_PASS" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" \
              -c "DROP SCHEMA IF EXISTS ref CASCADE;" \
              -c "DROP SCHEMA IF EXISTS auth CASCADE;" \
              -c "DROP SCHEMA IF EXISTS core CASCADE;" \
              -c "DROP SCHEMA IF EXISTS academico CASCADE;" \
              -c "DROP SCHEMA IF EXISTS inscripcion CASCADE;" \
              -c "DROP SCHEMA IF EXISTS evaluacion CASCADE;" \
              -c "DROP SCHEMA IF EXISTS observador CASCADE;" \
              -c "DROP SCHEMA IF EXISTS mensajeria CASCADE;" \
              -c "DROP SCHEMA IF EXISTS notificacion CASCADE;" \
              -c "DROP SCHEMA IF EXISTS horario CASCADE;" \
              -c "DROP SCHEMA IF EXISTS auditoria CASCADE;"
            echo "✅ Schemas eliminados"

            php artisan migrate:fresh --force --seed
            echo "✅ Base de datos recreada con migraciones y seeders"

            # -- CAMBIO A PRODUCCIÓN --
            # Cuando pases a producción, reemplaza el bloque de psql + migrate:fresh por:
            #   php artisan migrate:register-existing
            #   php artisan migrate --force

            echo "======================================"
            echo "PASO 6: CACHE DE PRODUCCIÓN"
            echo "======================================"
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✅ Caches generados"

            echo "======================================"
            echo "PASO 7: REINICIAR WORKERS DE COLA"
            echo "======================================"
            php artisan queue:restart
            echo "✅ Signal enviado a workers de cola"
            # Descomenta según tu servidor:
            # sudo systemctl restart php8.2-fpm
            # sudo supervisorctl restart all

            echo "======================================"
            echo "PASO 8: VERIFICACIÓN DE SALUD"
            echo "======================================"
            APP_URL=$(grep "^APP_URL=" .env | cut -d'=' -f2 | tr -d '\r')
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/ping" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ API respondiendo correctamente (HTTP 200)"
            else
              echo "⚠️  API retornó HTTP ${HTTP_STATUS} — revisar: tail -n 50 storage/logs/laravel.log"
            fi

            echo ""
            echo "🚀 Deploy completado exitosamente."