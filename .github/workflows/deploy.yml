name: Deploy Mandanga Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Desplegar en VPS vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            PROJECT_DIR="/var/www/mandanga-platform"
            cd $PROJECT_DIR

            echo "======================================"
            echo "PASO 1: BACKUP DEL .ENV"
            echo "======================================"
            if [ -f ".env" ]; then
              cp .env /tmp/.env.backup
              echo "✅ .env respaldado en /tmp/.env.backup"
            else
              echo "⚠️  No existe .env — crea uno manualmente: cp .env.example .env && nano .env"
              exit 1
            fi

            echo "======================================"
            echo "PASO 2: SINCRONIZAR CON GITHUB"
            echo "======================================"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "✅ Código sincronizado con origin/main"

            echo "======================================"
            echo "PASO 3: RESTAURAR .ENV"
            echo "======================================"
            cp /tmp/.env.backup .env
            echo "✅ .env restaurado correctamente"

            echo "======================================"
            echo "PASO 4: INSTALAR DEPENDENCIAS"
            echo "======================================"
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "✅ Dependencias instaladas"

            # ╔════════════════════════════════════════════════════════════╗
            # ║  ⚠️  BLOQUE TEMPORAL — MIGRATE REFRESH + SEED            ║
            # ║  Elimina toda la BD y la recrea desde cero con seeders.   ║
            # ║  DESHABILITAR en producción estable: comentar las 3       ║
            # ║  líneas de artisan y descomentar el migrate normal.       ║
            # ╚════════════════════════════════════════════════════════════╝
            echo "======================================"
            echo "PASO 5: MIGRACIONES Y SEEDERS (TEMPORAL)"
            echo "======================================"
            # --- INICIO BLOQUE TEMPORAL (deshabilitar cuando la BD sea estable) ---
            php artisan migrate:refresh --force --seed
            echo "✅ migrate:refresh --seed ejecutado (BD recreada desde cero)"
            # --- FIN BLOQUE TEMPORAL ---

            # --- INICIO BLOQUE PRODUCCIÓN (descomentar cuando la BD sea estable) ---
            # php artisan migrate --force
            # echo "✅ Migraciones incrementales ejecutadas"
            # --- FIN BLOQUE PRODUCCIÓN ---

            echo "======================================"
            echo "PASO 6: CACHE DE PRODUCCIÓN"
            echo "======================================"
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✅ Caches generados"

            echo "======================================"
            echo "PASO 7: REINICIAR WORKERS DE COLA"
            echo "======================================"
            php artisan queue:restart
            echo "✅ Signal enviado a workers de cola"
            # Descomenta según tu servidor:
            # sudo systemctl restart php8.2-fpm
            # sudo supervisorctl restart all

            echo "======================================"
            echo "PASO 8: VERIFICACIÓN DE SALUD"
            echo "======================================"
            APP_URL=$(grep "^APP_URL=" .env | cut -d'=' -f2 | tr -d '\r')
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/ping" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ API respondiendo correctamente (HTTP 200)"
            else
              echo "⚠️  API retornó HTTP ${HTTP_STATUS} — revisar: tail -n 50 storage/logs/laravel.log"
            fi

            echo ""
            echo "🚀 Deploy completado exitosamente."
